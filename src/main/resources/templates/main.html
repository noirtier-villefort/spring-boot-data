<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="row mt-3 ms-2 me-2">
        <div class="col-sm-6">
            <h1> User JSON Creator </h1>
            <div class="input-group mb-3">
                <input name="username" class="form-control" placeholder="Username"/>
            </div>
            <div class="input-group mb-3">
                <input name="email" class="form-control" placeholder="Email"/>
            </div>
            <div class="input-group mb-3">
                <input name="age" class="form-control" placeholder="Age" type="number"/>
            </div>
            <div class="btn-group md-3">
                <form>
                    <button class="btn btn-primary" type="button" onclick="saveUser()">Send and save</button>
                </form>
                <form method="get">
                    <button class="btn btn-secondary" type="button" onclick="createJson()">Generate JSON</button>
                </form>

                <script>
                    function saveUser(){
                        const user = {
                            name: document.getElementsByName("username")[0].value,
                            email: document.getElementsByName("email")[0].value,
                            age: document.getElementsByName("age")[0].value
                        };
                        fetch("users/add",{
                            method: "POST",
                            headers:{"Content-Type":"application/json"},
                            body: JSON.stringify(user)
                        });
                        document.getElementsByName("json-pre-tag")[0].value = "";

                    }
                    function createJson(){
                        const user = {
                            name: document.getElementsByName("username")[0].value,
                            email: document.getElementsByName("email")[0].value,
                            age: document.getElementsByName("age")[0].value
                        };
                        document.getElementsByName("jsontextarea")[0].value = JSON.stringify(user)
                    }
                    function getAllUsers(){
                        fetch("users/all").then(response => { return response.json()}) // Parse JSON (returns Promise)
                            // response.json() is an asynchronous operation - it takes time to parse the JSON from the response body.
                            .then(data => {
                                document.getElementById("json-pre-tag").textContent = JSON.stringify(data, null, 2);
                            });
                    }
                </script>
            </div>

        </div>

        <div class="col">
           <textarea name="jsontextarea"
                     class="form-control"
                     placeholder="JSON Output"
                     rows="10"
                     cols="10"
           ></textarea>
        </div>

        <div class="row mt-3">
            <form>
                <button class="btn btn-primary" type="button" onclick="getAllUsers()">Show all users</button>
            </form>
        </div>

    </div>

    <div id="json-div" class="row mt-2 ms-2 me-3 border p-3">
        <pre id="json-pre-tag"></pre>
    </div>
</body>
</html>
